<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dota 2 Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- ── Navbar ────────────────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="navbar-brand">
      <span class="navbar-logo">&#9889; DOTA 2 ANALYZER</span>
    </div>
    <div class="navbar-status">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Connecting…</span>
    </div>
  </nav>

  <!-- ── Main content ──────────────────────────────────────────────────── -->
  <main class="main-content">

    <!-- Waiting state -->
    <div class="waiting-state" id="waitingState">
      <div class="waiting-card">
        <div class="waiting-icon">&#127918;</div>
        <h1 class="waiting-title">Waiting for a match&hellip;</h1>
        <p class="waiting-subtitle">Launch Dota 2 and queue for a game</p>
      </div>
    </div>

    <!-- Match view (hidden until match detected) -->
    <div class="match-view" id="matchView" style="display:none">
      <div class="teams-grid">
        <!-- Your Team -->
        <div class="team-column" id="teamYours">
          <div class="team-header team-header--radiant">
            <span class="team-label">YOUR TEAM</span>
          </div>
          <div class="player-list" id="listYours"></div>
        </div>

        <!-- Enemy Team -->
        <div class="team-column" id="teamEnemy">
          <div class="team-header team-header--dire">
            <span class="team-label">ENEMY TEAM</span>
          </div>
          <div class="player-list" id="listEnemy"></div>
        </div>
      </div>
    </div>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
